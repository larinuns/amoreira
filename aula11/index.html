<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 11 - Objeto Math</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <h1>calculadora</h1>
        
        <div class="input-group">
            <label for="num">digite um número decimal ou inteiro:</label>
            <input type="number" id="num" step="any" placeholder="Ex: 4.7">
        </div>

        <div class="botoes-grid">
            <button onclick="calcular('round')" title="Arredonda para o mais próximo">round</button>
            <button onclick="calcular('ceil')" title="Arredonda para cima">ceil</button>
            <button onclick="calcular('floor')" title="Arredonda para baixo">floor</button>
            <button onclick="calcular('sqrt')" title="Raiz Quadrada">√ raiz</button>
            <button onclick="calcular('abs')" title="Valor Absoluto (positivo)">absoluto</button>
            <button onclick="calcular('trunc')" title="Remove os decimais">trunc</button>
            <button onclick="sortear()" class="btn-sorteio">🎲 sortear 1-100</button>
        </div>

        <div id="resultado-box">
            <p>resultado:</p>
            <span id="resultado">-</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
