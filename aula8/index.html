<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas - Aula 08</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- fazendo uma lista de tarefas simples usando DOM e eventos: -->
    <div class="container">
        <h1>✨ minha lista de tarefas</h1>
        
        <div class="input-group">
            <input type="text" id="nova-tarefa" placeholder="Digite uma nova tarefa...">
            <button id="btn-adicionar">Adicionar</button>
        </div>

        <ul id="lista-tarefas">
            <!-- As tarefas aparecerão aqui dinamicamente -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
